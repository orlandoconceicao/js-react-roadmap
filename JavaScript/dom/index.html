<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DOM JavaScript</title>

    <link rel="stylesheet" href="styles.css">

    <script src="scripts.js" defer></script>

</head>
<body>

    <div class="container">

        <!-- TÍTULO -->
        <h1 class="titulo">
            Sistema DOM JavaScript
        </h1>

        <!-- TEXTO -->
        <div class="mensagem">

            <p>
                Aprendendo DOM com JavaScript
            </p>

        </div>

        <!-- FORMULÁRIO -->
        <form class="formulario">

            <input 
                type="text"
                class="campoNome"
                placeholder="Digite seu nome"
            >

            <button type="submit" class="botao">
                Adicionar
            </button>

        </form>

        <!-- BOTÕES -->
        <div class="acoes">

            <button class="botaoTema">
                Alternar Tema
            </button>

            <button class="botaoLimpar">
                Limpar Lista
            </button>

        </div>

        <!-- CAIXA -->
        <div class="caixa">
            Caixa DOM
        </div>

        <!-- IMAGEM -->
        <img 
            class="imagem"
            src="https://picsum.photos/300/200"
            alt="Imagem"
        >

        <!-- LISTA -->
        <ul class="listaUsuarios">

            <li class="item">
                Usuário 1
            </li>

            <li class="item">
                Usuário 2
            </li>

            <li class="item">
                Usuário 3
            </li>

        </ul>

    </div>

</body>
</html>
